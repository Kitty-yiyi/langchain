name: AI Fix

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/ai-fix')
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}

    steps:
      - name: Load pull request context
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number,
            });

            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("head_repo", pr.head.repo.full_name);
            core.setOutput("base_ref", pr.base.ref);
            core.setOutput("same_repo", String(pr.head.repo.full_name === `${owner}/${repo}`));

      - name: Stop on forked pull requests
        if: steps.pr.outputs.same_repo != 'true'
        run: |
          echo "Automatic AI fixes are disabled for forked pull requests."
          echo "This protects repository write tokens from untrusted code."
          exit 1

      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install fix dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify OpenAI authentication
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY is not available to this workflow."
            echo "Add OPENAI_API_KEY under Settings -> Secrets and variables -> Actions -> Repository secrets."
            exit 1
          fi

          echo "Using OpenAI-compatible endpoint: $OPENAI_BASE_URL"
          echo "Using OpenAI-compatible model: $OPENAI_MODEL"

      - name: Apply OpenAI fixes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: python scripts/ai_apply_fixes.py

      - name: Commit AI fixes
        run: |
          if git diff --quiet; then
            echo "No AI-generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply AI code review fixes"
          git push origin HEAD:${{ steps.pr.outputs.head_ref }}
